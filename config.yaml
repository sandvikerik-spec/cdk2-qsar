data:
  target_chembl_id: CHEMBL301
  cache_path: data/cdk2_chembl_clean.csv
  min_pic50: 3.0
  max_pic50: 12.0
  test_size: 0.2
  random_seed: 42

model:
  hidden_channels: 200
  num_layers: 3
  num_timesteps: 2
  dropout: 0.2

training:
  epochs: 200
  batch_size: 32
  learning_rate: 0.001
  patience: 20
  checkpoint_path: models/attentivefp_best.pt